version: '3.8'

services:
  jmeter-test:
    build: .
    container_name: croc-shop-jmeter-test
    network_mode: host  # Required for kubectl access
    volumes:
      - ./results:/tests/results
      - ./customer_data.csv:/tests/customer_data.csv
      - ./order_data.csv:/tests/order_data.csv
      - ~/.kube:/root/.kube:ro  # Mount kubeconfig for cluster access
    environment:
      - KUBECONFIG=/root/.kube/config
      - NUM_CUSTOMERS=${NUM_CUSTOMERS:-100}
      - ORDERS_PER_CUSTOMER=${ORDERS_PER_CUSTOMER:-10}
      - THREADS=${THREADS:-10}
      - RAMP_TIME=${RAMP_TIME:-10}
      - USER_SERVICE_HOST=${USER_SERVICE_HOST:-croc-shop-user.croc-shop}
      - USER_SERVICE_PORT=${USER_SERVICE_PORT:-3002}
      - PRODUCT_SERVICE_HOST=${PRODUCT_SERVICE_HOST:-croc-shop-product-catalog.croc-shop}
      - PRODUCT_SERVICE_PORT=${PRODUCT_SERVICE_PORT:-3001}
      - CART_SERVICE_HOST=${CART_SERVICE_HOST:-croc-shop-cart.croc-shop}
      - CART_SERVICE_PORT=${CART_SERVICE_PORT:-3003}
      - ORDER_SERVICE_HOST=${ORDER_SERVICE_HOST:-croc-shop-order.croc-shop}
      - ORDER_SERVICE_PORT=${ORDER_SERVICE_PORT:-3004}
    command: ["./run-jmeter-test.sh"]
    
  # Optional: JMeter GUI mode
  jmeter-gui:
    build: .
    container_name: croc-shop-jmeter-gui
    network_mode: host
    volumes:
      - ./results:/tests/results
      - ~/.kube:/root/.kube:ro
      - /tmp/.X11-unix:/tmp/.X11-unix:ro  # For GUI display
    environment:
      - KUBECONFIG=/root/.kube/config
      - DISPLAY=${DISPLAY}
      - NUM_CUSTOMERS=${NUM_CUSTOMERS:-100}
      - ORDERS_PER_CUSTOMER=${ORDERS_PER_CUSTOMER:-10}
      - USER_SERVICE_HOST=${USER_SERVICE_HOST:-croc-shop-user.croc-shop}
      - USER_SERVICE_PORT=${USER_SERVICE_PORT:-3002}
      - PRODUCT_SERVICE_HOST=${PRODUCT_SERVICE_HOST:-croc-shop-product-catalog.croc-shop}
      - PRODUCT_SERVICE_PORT=${PRODUCT_SERVICE_PORT:-3001}
      - CART_SERVICE_HOST=${CART_SERVICE_HOST:-croc-shop-cart.croc-shop}
      - CART_SERVICE_PORT=${CART_SERVICE_PORT:-3003}
      - ORDER_SERVICE_HOST=${ORDER_SERVICE_HOST:-croc-shop-order.croc-shop}
      - ORDER_SERVICE_PORT=${ORDER_SERVICE_PORT:-3004}
    command: ["./run-jmeter-test.sh", "-g"]
    profiles:
      - gui  # Only start with --profile gui
