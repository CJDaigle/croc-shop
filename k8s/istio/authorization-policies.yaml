apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: frontend-to-services
  namespace: croc-shop-product-catalog
spec:
  action: ALLOW
  rules:
  - from:
    - source:
        namespaces: ["croc-shop-frontend", "istio-system"]
---
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: frontend-to-user
  namespace: croc-shop-user
spec:
  action: ALLOW
  rules:
  - from:
    - source:
        namespaces: ["croc-shop-frontend", "istio-system"]
---
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: frontend-to-cart
  namespace: croc-shop-cart
spec:
  action: ALLOW
  rules:
  - from:
    - source:
        namespaces: ["croc-shop-frontend", "istio-system"]
---
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: frontend-to-order
  namespace: croc-shop-order
spec:
  action: ALLOW
  rules:
  - from:
    - source:
        namespaces: ["croc-shop-frontend", "istio-system"]
---
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: product-catalog-to-postgres
  namespace: croc-shop-data
spec:
  selector:
    matchLabels:
      app: postgres
  action: ALLOW
  rules:
  - to:
    - operation:
        ports: ["5432"]
---
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: cart-to-redis
  namespace: croc-shop-data
spec:
  selector:
    matchLabels:
      app: redis
  action: ALLOW
  rules:
  - to:
    - operation:
        ports: ["6379"]
