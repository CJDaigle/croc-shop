# HTTPRoute for croc-shop frontend and API services
# Routes traffic from the Cilium Gateway to backend services by path
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: croc-shop-route
  namespace: default
spec:
  parentRefs:
    - name: main-gateway
      namespace: default
  hostnames:
    - "croc-shop.apo-llm-test.com"
  rules:
    # Product Catalog API
    - matches:
        - path:
            type: PathPrefix
            value: /api/products
      backendRefs:
        - name: product-catalog
          namespace: croc-shop-product-catalog
          port: 3001
    # User / Auth API
    - matches:
        - path:
            type: PathPrefix
            value: /api/auth
        - path:
            type: PathPrefix
            value: /api/users
      backendRefs:
        - name: user
          namespace: croc-shop-user
          port: 3002
    # Cart API
    - matches:
        - path:
            type: PathPrefix
            value: /api/cart
      backendRefs:
        - name: cart
          namespace: croc-shop-cart
          port: 3003
    # Order API
    - matches:
        - path:
            type: PathPrefix
            value: /api/orders
      backendRefs:
        - name: order
          namespace: croc-shop-order
          port: 3004
    # Chatbot API
    - matches:
        - path:
            type: PathPrefix
            value: /api/chat
      backendRefs:
        - name: chatbot
          namespace: croc-shop-chatbot
          port: 3005
    # Frontend (catch-all, must be last)
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: frontend
          namespace: croc-shop-frontend
          port: 80

---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: prometheus-route
  namespace: default
spec:
  parentRefs:
    - name: main-gateway
      namespace: default
  hostnames:
    - "prometheus.apo-llm-test.com"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: prometheus
          namespace: croc-shop-monitoring
          port: 9090

---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: grafana-route
  namespace: default
spec:
  parentRefs:
    - name: main-gateway
      namespace: default
  hostnames:
    - "grafana.apo-llm-test.com"
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: grafana
          namespace: croc-shop-monitoring
          port: 3000
