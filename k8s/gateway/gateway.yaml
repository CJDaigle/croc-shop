# Cilium Gateway API - Main Gateway for croc-shop
# Runs on dedicated gateway nodes (role=gateway) via hostNetwork
# Requires: Gateway API CRDs installed, Cilium gatewayAPI.enabled=true
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: main-gateway
  namespace: default
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  gatewayClassName: cilium
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      allowedRoutes:
        namespaces:
          from: All
    - name: https-croc-shop
      protocol: HTTPS
      port: 443
      hostname: croc-shop.apo-llm-test.com
      tls:
        mode: Terminate
        certificateRefs:
          - name: croc-shop-tls
            namespace: default
      allowedRoutes:
        namespaces:
          from: All
    - name: https-chuck
      protocol: HTTPS
      port: 443
      hostname: chuck.apo-llm-test.com
      tls:
        mode: Terminate
        certificateRefs:
          - name: chuck-tls
            namespace: default
      allowedRoutes:
        namespaces:
          from: All
    - name: https-open-webui
      protocol: HTTPS
      port: 443
      hostname: open-webui.apo-llm-test.com
      tls:
        mode: Terminate
        certificateRefs:
          - name: open-webui-tls
            namespace: default
      allowedRoutes:
        namespaces:
          from: All
    - name: https-sock-shop
      protocol: HTTPS
      port: 443
      hostname: sock-shop.apo-llm-test.com
      tls:
        mode: Terminate
        certificateRefs:
          - name: sock-shop-tls
            namespace: default
      allowedRoutes:
        namespaces:
          from: All
    - name: https-hubble
      protocol: HTTPS
      port: 443
      hostname: hubble.apo-llm-test.com
      tls:
        mode: Terminate
        certificateRefs:
          - name: hubble-tls
            namespace: default
      allowedRoutes:
        namespaces:
          from: All
