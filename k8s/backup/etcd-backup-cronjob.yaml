apiVersion: batch/v1
kind: CronJob
metadata:
  name: etcd-backup
  namespace: kube-system
spec:
  schedule: "0 2 * * *"  # Daily at 2 AM UTC
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 7
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          hostNetwork: true
          hostPID: true
          tolerations:
          - key: "node-role.kubernetes.io/control-plane"
            operator: "Exists"
            effect: "NoSchedule"
          - key: "node-role.kubernetes.io/etcd"
            operator: "Exists"
            effect: "NoExecute"
          nodeSelector:
            node-role.kubernetes.io/control-plane: "true"
          containers:
          - name: etcd-backup
            image: rancher/rke2-tools:v1.31.12
            command:
            - /bin/bash
            - -c
            - |
              set -euo pipefail
              
              # Configuration
              BACKUP_DIR="/var/lib/rancher/rke2/server/db/etcd-backups"
              RETENTION_DAYS=30
              TIMESTAMP=$(date +%Y%m%d-%H%M%S)
              BACKUP_NAME="etcd-backup-${TIMESTAMP}"
              LOG_FILE="/var/log/etcd-backup.log"
              
              # RKE2 etcd paths
              ETCD_DATA_DIR="/var/lib/rancher/rke2/server/db/etcd"
              ETCD_CERT_DIR="/var/lib/rancher/rke2/server/tls/etcd"
              
              # Logging function
              backup_log() {
                echo "[$(date '+%Y-%m-%d %H:%M:%S')] $1" | tee -a "$LOG_FILE"
              }
              
              # Error handling
              error_exit() {
                backup_log "ERROR: $1"
                exit 1
              }
              
              backup_log "Starting etcd backup: $BACKUP_NAME"
              
              # Create backup directory
              mkdir -p "$BACKUP_DIR"
              
              # Check etcd certificates
              ETCD_CERT_FILE="$ETCD_CERT_DIR/server-ca.crt"
              ETCD_KEY_FILE="$ETCD_CERT_DIR/server-ca.key"
              ETCD_CA_FILE="$ETCD_CERT_DIR/server-ca.crt"
              
              if [[ ! -f "$ETCD_CERT_FILE" ]] || [[ ! -f "$ETCD_KEY_FILE" ]]; then
                error_exit "etcd certificates not found in $ETCD_CERT_DIR"
              fi
              
              # Get etcd endpoint
              ETCD_ENDPOINT="https://127.0.0.1:2379"
              
              # Test etcd connectivity
              if ! ETCDCTL_API=3 etcdctl \
                --cacert="$ETCD_CA_FILE" \
                --cert="$ETCD_CERT_FILE" \
                --key="$ETCD_KEY_FILE" \
                --endpoints="$ETCD_ENDPOINT" \
                endpoint health >/dev/null 2>&1; then
                error_exit "Cannot connect to etcd at $ETCD_ENDPOINT"
              fi
              
              # Create etcd snapshot
              backup_log "Creating etcd snapshot..."
              ETCDCTL_API=3 etcdctl \
                --cacert="$ETCD_CA_FILE" \
                --cert="$ETCD_CERT_FILE" \
                --key="$ETCD_KEY_FILE" \
                --endpoints="$ETCD_ENDPOINT" \
                snapshot save "$BACKUP_DIR/$BACKUP_NAME.db"
              
              # Verify snapshot
              backup_log "Verifying snapshot integrity..."
              if ETCDCTL_API=3 etcdctl \
                --cacert="$ETCD_CA_FILE" \
                --cert="$ETCD_CERT_FILE" \
                --key="$ETCD_KEY_FILE" \
                --endpoints="$ETCD_ENDPOINT" \
                snapshot status "$BACKUP_DIR/$BACKUP_NAME.db" --write-out=table; then
                backup_log "Snapshot verification successful"
              else
                error_exit "Snapshot verification failed"
              fi
              
              # Create backup metadata
              METADATA_FILE="$BACKUP_DIR/$BACKUP_NAME-metadata.json"
              cat > "$METADATA_FILE" << METADATAEOF
              {
                "backup_name": "$BACKUP_NAME",
                "timestamp": "$TIMESTAMP",
                "created_at": "$(date -Iseconds)",
                "etcd_version": "$(ETCDCTL_API=3 etcdctl --cacert=$ETCD_CA_FILE --cert=$ETCD_CERT_FILE --key=$ETCD_KEY_FILE --endpoints=$ETCD_ENDPOINT version 2>/dev/null | grep 'etcdserver' | cut -d':' -f2 | tr -d '[:space:]' || echo 'unknown')",
                "node_hostname": "$(hostname)",
                "node_ip": "$(hostname -I | awk '{print $1}')",
                "kubernetes_version": "$(kubectl version --short 2>/dev/null | grep 'Server Version' | cut -d':' -f2 | tr -d '[:space:]' || echo 'unknown')",
                "snapshot_size": "$(stat -c%s "$BACKUP_DIR/$BACKUP_NAME.db" 2>/dev/null || stat -f%z "$BACKUP_DIR/$BACKUP_NAME.db" 2>/dev/null || echo 'unknown')",
                "snapshot_checksum": "$(sha256sum "$BACKUP_DIR/$BACKUP_NAME.db" | cut -d' ' -f1)",
                "backup_script_version": "1.0",
                "cluster_name": "cilium-ai-defense"
              }
              METADATAEOF
              
              # Compress the backup
              backup_log "Compressing backup..."
              gzip "$BACKUP_DIR/$BACKUP_NAME.db"
              gzip "$BACKUP_DIR/$BACKUP_NAME-metadata.json"
              
              # Cleanup old backups
              backup_log "Cleaning up backups older than $RETENTION_DAYS days..."
              find "$BACKUP_DIR" -name "etcd-backup-*.db.gz" -mtime +$RETENTION_DAYS -delete || true
              find "$BACKUP_DIR" -name "etcd-backup-*-metadata.json.gz" -mtime +$RETENTION_DAYS -delete || true
              
              # List current backups
              BACKUP_COUNT=$(find "$BACKUP_DIR" -name "etcd-backup-*.db.gz" | wc -l)
              backup_log "Backup completed successfully"
              backup_log "Total backups retained: $BACKUP_COUNT"
              backup_log "Backup location: $BACKUP_DIR/$BACKUP_NAME.db.gz"
              
              # Create backup summary
              echo "=========================================="
              echo "etcd Backup Summary"
              echo "=========================================="
              echo "Backup Name: $BACKUP_NAME"
              echo "Created: $(date)"
              echo "Size: $(du -h "$BACKUP_DIR/$BACKUP_NAME.db.gz" | cut -f1)"
              echo "Checksum: $(sha256sum "$BACKUP_DIR/$BACKUP_NAME.db.gz" | cut -d' ' -f1)"
              echo "Location: $BACKUP_DIR/$BACKUP_NAME.db.gz"
              echo "Retained Backups: $BACKUP_COUNT"
              echo "=========================================="
              
              backup_log "etcd backup process completed successfully"
              
              # Optional: Copy to external storage (uncomment and configure)
              # if command -v aws >/dev/null 2>&1; then
              #   backup_log "Copying backup to S3..."
              #   aws s3 cp "$BACKUP_DIR/$BACKUP_NAME.db.gz" "s3://your-backup-bucket/etcd-backups/"
              #   aws s3 cp "$BACKUP_DIR/$BACKUP_NAME-metadata.json.gz" "s3://your-backup-bucket/etcd-backups/"
              #   backup_log "Backup copied to S3 successfully"
              # fi
            volumeMounts:
            - name: etcd-data
              mountPath: /var/lib/rancher/rke2/server/db
              readOnly: true
            - name: etcd-certs
              mountPath: /var/lib/rancher/rke2/server/tls/etcd
              readOnly: true
            - name: backup-dir
              mountPath: /var/lib/rancher/rke2/server/db/etcd-backups
            - name: log-dir
              mountPath: /var/log
            securityContext:
              privileged: true
            env:
            - name: ETCDCTL_API
              value: "3"
            - name: HOME
              value: "/root"
          volumes:
          - name: etcd-data
            hostPath:
              path: /var/lib/rancher/rke2/server/db
              type: Directory
          - name: etcd-certs
            hostPath:
              path: /var/lib/rancher/rke2/server/tls/etcd
              type: Directory
          - name: backup-dir
            hostPath:
              path: /var/lib/rancher/rke2/server/db/etcd-backups
              type: DirectoryOrCreate
          - name: log-dir
            hostPath:
              path: /var/log
              type: Directory
          restartPolicy: OnFailure
