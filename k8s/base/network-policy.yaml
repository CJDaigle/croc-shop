apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: product-catalog-policy
  namespace: croc-shop-product-catalog
spec:
  podSelector:
    matchLabels:
      app: product-catalog
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: croc-shop-frontend
    - namespaceSelector:
        matchLabels:
          name: croc-shop-order
    - ipBlock:
        cidr: 10.0.0.0/16
    ports:
    - protocol: TCP
      port: 3001
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          name: croc-shop-data
      podSelector:
        matchLabels:
          app: postgres
    ports:
    - protocol: TCP
      port: 5432
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 53
    - protocol: UDP
      port: 53
---
