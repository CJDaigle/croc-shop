    matchLabels:
      app: frontend
  policyTypes:
  - Egress
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          name: croc-shop-product-catalog
      podSelector:
        matchLabels:
          app: product-catalog
    ports:
    - protocol: TCP
      port: 3001
  - to:
    - namespaceSelector:
        matchLabels:
          name: croc-shop-user
      podSelector:
        matchLabels:
          app: user
    ports:
    - protocol: TCP
      port: 3002
  - to:
    - namespaceSelector:
        matchLabels:
          name: croc-shop-cart
      podSelector:
        matchLabels:
          app: cart
    ports:
    - protocol: TCP
      port: 3003
  - to:
    - namespaceSelector:
        matchLabels:
          name: croc-shop-order
      podSelector:
        matchLabels:
          app: order
    ports:
    - protocol: TCP
      port: 3004
  - to:
    - namespaceSelector:
        matchLabels:
          name: croc-shop-chatbot
      podSelector:
        matchLabels:
          app: chatbot
    ports:
    - protocol: TCP
      port: 3005
  - to:
    - namespaceSelector: {}
    ports:
    - protocol: TCP
      port: 53
    - protocol: UDP
      port: 53
---
