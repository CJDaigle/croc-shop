apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: crock-shop-ingress
  namespace: crock-shop
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  rules:
  - host: crock-shop.local
    http:
      paths:
      - path: /api/products
        pathType: Prefix
        backend:
          service:
            name: product-catalog
            port:
              number: 3001
      - path: /api/auth
        pathType: Prefix
        backend:
          service:
            name: user
            port:
              number: 3002
      - path: /api/users
        pathType: Prefix
        backend:
          service:
            name: user
            port:
              number: 3002
      - path: /api/cart
        pathType: Prefix
        backend:
          service:
            name: cart
            port:
              number: 3003
      - path: /api/orders
        pathType: Prefix
        backend:
          service:
            name: order
            port:
              number: 3004
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend
            port:
              number: 80
