apiVersion: v1
kind: Service
metadata:
  name: product-catalog
  namespace: croc-shop
spec:
  type: ExternalName
  externalName: product-catalog.croc-shop-product-catalog.svc.cluster.local
  ports:
  - port: 3001
    protocol: TCP
    name: http
---
apiVersion: v1
kind: Service
metadata:
  name: user
  namespace: croc-shop
spec:
  type: ExternalName
  externalName: user.croc-shop-user.svc.cluster.local
  ports:
  - port: 3002
    protocol: TCP
    name: http
---
apiVersion: v1
kind: Service
metadata:
  name: cart
  namespace: croc-shop
spec:
  type: ExternalName
  externalName: cart.croc-shop-cart.svc.cluster.local
  ports:
  - port: 3003
    protocol: TCP
    name: http
---
apiVersion: v1
kind: Service
metadata:
  name: order
  namespace: croc-shop
spec:
  type: ExternalName
  externalName: order.croc-shop-order.svc.cluster.local
  ports:
  - port: 3004
    protocol: TCP
    name: http
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: croc-shop
spec:
  type: ExternalName
  externalName: frontend.croc-shop-frontend.svc.cluster.local
  ports:
  - port: 80
    protocol: TCP
    name: http
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: croc-shop-ingress
  namespace: croc-shop
  annotations:
    kubernetes.io/ingress.class: nginx
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  rules:
  - host: croc-shop.local
    http:
      paths:
      - path: /api/products
        pathType: Prefix
        backend:
          service:
            name: product-catalog
            port:
              number: 3001
      - path: /api/auth
        pathType: Prefix
        backend:
          service:
            name: user
            port:
              number: 3002
      - path: /api/users
        pathType: Prefix
        backend:
          service:
            name: user
            port:
              number: 3002
      - path: /api/cart
        pathType: Prefix
        backend:
          service:
            name: cart
            port:
              number: 3003
      - path: /api/orders
        pathType: Prefix
        backend:
          service:
            name: order
            port:
              number: 3004
      - path: /
        pathType: Prefix
        backend:
          service:
            name: frontend
            port:
              number: 80
