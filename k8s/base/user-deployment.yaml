apiVersion: v1
kind: ConfigMap
metadata:
  name: user-config
  namespace: croc-shop-user
data:
  PORT: "3002"
  DB_HOST: postgres.croc-shop-data.svc.cluster.local
  DB_PORT: "5432"
  DB_NAME: crocshop
  DB_USER: postgres
---
# WARNING: Plaintext secrets for dev/demo only.
# In production, use External Secrets Operator, Sealed Secrets, or Vault.
apiVersion: v1
kind: Secret
metadata:
  name: user-secret
  namespace: croc-shop-user
type: Opaque
stringData:
  JWT_SECRET: change-this-in-production-use-k8s-secrets
  DB_PASSWORD: postgres
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: user
  namespace: croc-shop-user
  labels:
    app: user
    version: v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: user
  template:
    metadata:
      labels:
        app: user
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3002"
        prometheus.io/path: "/metrics"
    spec:
      containers:
      - name: user
        image: cjdaigle2/croc-shop-user:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3002
          name: http
        envFrom:
        - configMapRef:
            name: user-config
        env:
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: user-secret
              key: JWT_SECRET
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: user-secret
              key: DB_PASSWORD
        livenessProbe:
          httpGet:
            path: /health
            port: 3002
          initialDelaySeconds: 30
          periodSeconds: 10
        readinessProbe:
          httpGet:
            path: /ready
            port: 3002
          initialDelaySeconds: 5
          periodSeconds: 5
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "200m"
---
apiVersion: v1
kind: Service
metadata:
  name: user
  namespace: croc-shop-user
  labels:
    app: user
spec:
  type: ClusterIP
  ports:
  - port: 3002
    targetPort: 3002
    protocol: TCP
    name: http
  selector:
    app: user
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: user-hpa
  namespace: croc-shop-user
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: user
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
