server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    location = /health {
        access_log off;
        default_type application/json;
        return 200 '{"status":"healthy","service":"frontend"}';
    }

    location = /ready {
        access_log off;
        default_type application/json;
        return 200 '{"status":"ready","service":"frontend"}';
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location /api/products {
        proxy_pass http://product-catalog.croc-shop-product-catalog.svc.cluster.local:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/auth {
        proxy_pass http://user.croc-shop-user.svc.cluster.local:3002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/users {
        proxy_pass http://user.croc-shop-user.svc.cluster.local:3002;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/cart {
        proxy_pass http://cart.croc-shop-cart.svc.cluster.local:3003;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/orders {
        proxy_pass http://order.croc-shop-order.svc.cluster.local:3004;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/chat {
        proxy_pass http://chatbot.croc-shop-chatbot.svc.cluster.local:3005;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_buffering off;
    }
}
