version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: crocshop
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  product-catalog:
    build: ./services/product-catalog
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: crocshop
      DB_USER: postgres
      DB_PASSWORD: postgres
    depends_on:
      postgres:
        condition: service_healthy

  user:
    build: ./services/user
    ports:
      - "3002:3002"
    environment:
      PORT: 3002
      JWT_SECRET: dev-secret-change-in-production
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: crocshop
      DB_USER: postgres
      DB_PASSWORD: postgres
    depends_on:
      postgres:
        condition: service_healthy

  cart:
    build: ./services/cart
    ports:
      - "3003:3003"
    environment:
      PORT: 3003
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: dev-secret-change-in-production
    depends_on:
      redis:
        condition: service_healthy

  order:
    build: ./services/order
    ports:
      - "3004:3004"
    environment:
      PORT: 3004
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: crocshop
      DB_USER: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: dev-secret-change-in-production
      PRODUCT_CATALOG_URL: http://product-catalog:3001
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./services/frontend
    ports:
      - "3000:80"
    volumes:
      - ./services/frontend/nginx.dev.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - product-catalog
      - user
      - cart
      - order

volumes:
  postgres-data:
